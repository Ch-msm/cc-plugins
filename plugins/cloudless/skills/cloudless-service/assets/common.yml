# Cloudless 公共基础配置模板。
# 对应 Config.load("common", "your-service") 中的 common.yml。

# 内部调用安全密钥。
security_key: your-security-key

# 授权密钥。
license_secret_key: your-license-secret-key

# API 列表接口是否需要授权。
api_list_need_auth: false

# 运行模式，可按环境改成 DEV / TEST / PROD。
run_mode: DEV

# 是否禁用调用链日志。
disabled_trace_log: false

# 平台地址，只有服务间需要回指统一平台时再配置。
# platform_address: http://127.0.0.1:9000

server:
  # 外部属性文件路径。存在时会覆盖 YAML 中同名配置。
  config_path: /jre/config.properties
  # 授权文件路径。
  license_path: /jre/license.json

data_source:
  # 数据库类型：Postgresql / OpenGauss / Vastbase / 达梦
  database: Postgresql
  # 连接池类型。
  connection_type: Hikari
  # 单数据库实例时使用的数据库名。
  database_name: cloudless
  # 主库 JDBC。
  jdbc: jdbc:postgresql://127.0.0.1:5432/cloudless?sslmode=disable&stringtype=unspecified&user=postgres&password=123456
  # 只读库 JDBC，没有就留空。
  # jdbc_read_only: jdbc:postgresql://127.0.0.1:5432/cloudless?sslmode=disable&stringtype=unspecified&user=postgres&password=123456
  # 是否在更新数据时触发数据变化通知。
  update_notification: true
  # OpenGauss / 海量数据库常见为 true。
  empty_string_output_null: false

data_source_time_series:
  # 时序库类型，没有时序库可以先保留默认值并注释 jdbc。
  database: Clickhouse
  connection_type: Hikari
  # jdbc: jdbc:clickhouse://127.0.0.1:8123/default?user=default&password=clickhouse

redis:
  # 模式：单机 / 主从 / 哨兵 / 集群
  mode: 单机
  # YAML 数组会被框架自动转成逗号分隔字符串。
  host:
    - 127.0.0.1:6379
  username: default
  password: 123456
  # 单机模式下生效。
  database: 0

message_queue:
  # 当前实现实际走 Kafka。
  type: kafka
  host:
    - 127.0.0.1:9092

file_server:
  host: 127.0.0.1:9007
  auth: false
